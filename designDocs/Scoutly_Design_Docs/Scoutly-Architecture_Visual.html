<h1>Scoutly</h1>
<p class="sub">Architecture Diagrams</p>

<!-- ================================================================ -->
<!--  DIAGRAM 1 — SYSTEM ARCHITECTURE                                 -->
<!--                                                                  -->
<!--  LAYOUT (all arrows avoid shapes):                               -->
<!--    - Services→PG: routed far left (x=55) to avoid Scraper       -->
<!--    - Redis→Scraper: routed above worker boxes                    -->
<!--    - Scraper→JSONB: curved right, below status note              -->
<!--    - Embedder→PG: curved far right then down-left, below JSONB  -->
<!--    - Scraper→PublicWeb: routed far left (x=55) to avoid PG      -->
<!-- ================================================================ -->
<p class="section-label">01 &nbsp; System Architecture</p>

<svg width="960" height="820" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="a" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,9 3,0 6" fill="#94a3b8"/>
    </marker>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── SWIM LANES ── -->
  <rect x="22" y="56"  width="916" height="92"  rx="8" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <rect x="22" y="156" width="916" height="92"  rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <rect x="22" y="256" width="916" height="92"  rx="8" fill="#fefce8" stroke="#fde68a" stroke-width="1.5"/>

  <rect x="22" y="656" width="916" height="92"  rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- ── ARROWS (rendered BEFORE boxes so boxes sit on top) ── -->

  <!-- 1. React → FastAPI (HTTP / JSON) -->
  <line x1="430" y1="130" x2="284" y2="170" stroke="#64748b" stroke-width="1.8" marker-end="url(#a)"/>
  <rect x="316" y="142" width="72" height="16" rx="4" fill="#e2e8f0"/>
  <text x="352" y="154" text-anchor="middle" font-size="10" fill="#334155">HTTP / JSON</text>

  <!-- 2. React → JWT (Auth) -->
  <line x1="530" y1="130" x2="664" y2="170" stroke="#64748b" stroke-width="1.8" marker-end="url(#a)"/>
  <rect x="580" y="142" width="36" height="16" rx="4" fill="#e2e8f0"/>
  <text x="598" y="154" text-anchor="middle" font-size="10" fill="#334155">Auth</text>

  <!-- 3. FastAPI → Services Layer (short diagonal) -->
  <line x1="222" y1="230" x2="192" y2="270" stroke="#64748b" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- 4. FastAPI → Redis Queue (Enqueue Job) -->
  <line x1="340" y1="230" x2="528" y2="270" stroke="#64748b" stroke-width="1.8" marker-end="url(#a)"/>
  <rect x="388" y="242" width="84" height="16" rx="4" fill="#e2e8f0"/>
  <text x="430" y="254" text-anchor="middle" font-size="10" fill="#334155">Enqueue Job</text>

  <!-- 5. Services → PostgreSQL (pgvector query)
       ROUTED LEFT at x=55 to avoid Scraper (x=120-280) and all worker boxes.
       Path: Services left edge (72,310) → left gutter (55,310) → down → (55,590) → PG left edge (72,590) -->
  <path d="M 72 310 L 55 310 L 55 590 L 72 590"
        stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#a)"/>
  <rect x="32" y="454" width="46" height="34" rx="4" fill="#e2e8f0"/>
  <text x="55" y="468" text-anchor="middle" font-size="9" fill="#334155">pgvector</text>
  <text x="55" y="481" text-anchor="middle" font-size="9" fill="#334155">query</text>

  <!-- 6. Redis → Scraper (Celery Dequeue)
       ROUTED: from Redis bottom-left (490,330) → down to y=365 → left to Scraper top-right (260,365) → down to Scraper top (260,380)
       This stays above the worker boxes (y=380) -->
  <path d="M 490 330 L 490 365 L 260 365 L 260 380"
        stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#a)"/>
  <rect x="330" y="353" width="108" height="16" rx="4" fill="#e2e8f0"/>
  <text x="384" y="365" text-anchor="middle" font-size="10" fill="#334155">Celery Dequeue</text>

  <!-- 7. Scraper → JSONB Staging (store raw)
       ROUTED: from Scraper bottom-right (280,450) → down to y=510 → right to JSONB top-center (550,510) → down to JSONB (550,570)
       Stays below status note (y=465-495) and routes right cleanly -->
  <path d="M 280 450 L 280 515 L 550 515 L 550 570"
        stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#a)"/>
  <rect x="370" y="503" width="80" height="16" rx="4" fill="#e2e8f0"/>
  <text x="410" y="515" text-anchor="middle" font-size="10" fill="#334155">Store raw</text>

  <!-- 8. Embedder → PostgreSQL (store vectors)
       ROUTED: from Embedder bottom (730,450) → down to y=510 → right to x=870 → down to y=640 → left to x=204 → up to PG bottom (204,630)
       Goes far right then sweeps under JSONB to reach PG from below -->
  <path d="M 730 450 L 730 510 L 870 510 L 870 645 L 204 645 L 204 630"
        stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#a)"/>
  <rect x="480" y="633" width="100" height="16" rx="4" fill="#e2e8f0"/>
  <text x="530" y="645" text-anchor="middle" font-size="10" fill="#334155">Store vectors</text>

  <!-- 9. Scraper → Public Web (fetch profiles)
       ROUTED LEFT at x=55 to avoid PostgreSQL (x=72-336).
       Path: Scraper left (120,430) → left gutter (55,430) → down → (55,700) → Public Web left edge (120,700) -->
  <path d="M 120 430 L 55 430 L 55 700 L 120 700"
        stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#a)"/>
  <rect x="32" y="570" width="46" height="34" rx="4" fill="#e2e8f0"/>
  <text x="55" y="584" text-anchor="middle" font-size="9" fill="#334155">Fetch</text>
  <text x="55" y="597" text-anchor="middle" font-size="9" fill="#334155">profiles</text>

  <!-- ── COMPONENT BOXES (rendered after arrows so they sit on top) ── -->

  <!-- React SPA — CLIENT -->
  <rect x="350" y="70" width="260" height="60" rx="9" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2" filter="url(#sh)"/>

  <text x="258" y="196" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">FastAPI</text>
  <text x="258" y="215" text-anchor="middle" font-size="11" fill="#dcfce7">REST Endpoints · Pydantic Models</text>

  <!-- JWT Auth — BACKEND right -->

  <text x="698" y="196" text-anchor="middle" font-size="14" font-weight="700" fill="#14532d">JWT Auth</text>
  <text x="698" y="215" text-anchor="middle" font-size="11" fill="#166534">Login · Token Validation</text>

  <!-- Services Layer — SERVICES left -->

  <text x="180" y="296" text-anchor="middle" font-size="13" font-weight="700" fill="#1c0700">Services Layer</text>
  <text x="180" y="314" text-anchor="middle" font-size="11" fill="#78350f">Matching · Query Logic</text>

  <!-- Redis Queue — SERVICES right -->
  <rect x="490" y="270" width="214" height="60" rx="9" fill="#f59e0b" stroke="#b45309" stroke-width="2" filter="url(#sh)"/>
  <text x="597" y="296" text-anchor="middle" font-size="13" font-weight="700" fill="#1c0700">Redis Queue</text>
  <text x="597" y="314" text-anchor="middle" font-size="11" fill="#78350f">Task Broker · Job Queue</text>

  <!-- ── WORKERS (3-step Celery chain) ── -->

  <!-- Step ① Scraper -->
  <rect x="120" y="380" width="160" height="70" rx="9" fill="#fb923c" stroke="#c2410c" stroke-width="2" filter="url(#sh)"/>
  <text x="200" y="404" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">① Scraper</text>
  <text x="200" y="422" text-anchor="middle" font-size="11" fill="#ffedd5">BS4 + Playwright</text>
  <text x="200" y="438" text-anchor="middle" font-size="10" fill="#ffedd5">Fetch public profiles</text>

  <!-- Step ② Enrichment -->
  <rect x="370" y="380" width="180" height="70" rx="9" fill="#fb923c" stroke="#c2410c" stroke-width="2" filter="url(#sh)"/>
  <text x="460" y="404" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">② Enrichment</text>
  <text x="460" y="422" text-anchor="middle" font-size="11" fill="#ffedd5">Parse &amp; Structure</text>
  <text x="460" y="438" text-anchor="middle" font-size="10" fill="#ffedd5">Raw → structured fields</text>

  <!-- Step ③ Embedder -->
  <rect x="640" y="380" width="180" height="70" rx="9" fill="#fb923c" stroke="#c2410c" stroke-width="2" filter="url(#sh)"/>
  <text x="730" y="404" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">③ Embedder</text>
  <text x="730" y="422" text-anchor="middle" font-size="11" fill="#ffedd5">SBERT (MiniLM-L6-v2)</text>
  <text x="730" y="438" text-anchor="middle" font-size="10" fill="#ffedd5">Generate profile vectors</text>

  <!-- Celery chain arrows between worker steps -->
  <line x1="280" y1="415" x2="370" y2="415" stroke="#fff" stroke-width="2" marker-end="url(#a)"/>
  <line x1="550" y1="415" x2="640" y2="415" stroke="#fff" stroke-width="2" marker-end="url(#a)"/>

  <!-- Chain labels -->
  <rect x="300" y="402" width="50" height="14" rx="3" fill="#ea580c"/>
  <text x="325" y="412" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">chain</text>
  <rect x="570" y="402" width="50" height="14" rx="3" fill="#ea580c"/>
  <text x="595" y="412" text-anchor="middle" font-size="9" font-weight="600" fill="#fff">chain</text>

  <!-- Status update note -->
  <rect x="300" y="465" width="360" height="30" rx="6" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <text x="480" y="484" text-anchor="middle" font-size="10" fill="#9a3412">Status updates: pending → scraped → enriched → ready</text>

  <!-- PostgreSQL — STORAGE -->
  <rect x="72" y="570" width="264" height="60" rx="9" fill="#8b5cf6" stroke="#6d28d9" stroke-width="2" filter="url(#sh)"/>
  <text x="204" y="596" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">PostgreSQL + pgvector</text>
  <text x="204" y="614" text-anchor="middle" font-size="11" fill="#ddd6fe">Users · Leads · Embeddings</text>

  <!-- JSONB Staging — STORAGE right -->
  <rect x="440" y="570" width="220" height="60" rx="9" fill="#a78bfa" stroke="#6d28d9" stroke-width="2" filter="url(#sh)"/>
  <text x="550" y="596" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">JSONB Staging</text>
  <text x="550" y="614" text-anchor="middle" font-size="11" fill="#ede9fe">Raw scraped data (reprocessable)</text>

  <!-- Public Web — EXTERNAL -->
  <rect x="120" y="670" width="180" height="60" rx="9" fill="#94a3b8" stroke="#64748b" stroke-width="2" filter="url(#sh)"/>
  <text x="210" y="696" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Public Web</text>
  <text x="210" y="714" text-anchor="middle" font-size="11" fill="#f1f5f9">LinkedIn · Company Sites</text>

  <!-- ── LANE LABELS ── -->
  <rect x="32" y="62" width="64"  height="17" rx="3" fill="#eff6ff"/>
  <text x="38" y="74"  font-size="10" font-weight="700" fill="#1d4ed8"  letter-spacing="1.5">CLIENT</text>

  <rect x="32" y="162" width="82"  height="17" rx="3" fill="#f0fdf4"/>

<p class="section-label">02 &nbsp; Data Model</p>

<svg width="860" height="620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="b" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">

    </marker>
    <filter id="sh2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <rect width="860" height="620" fill="#fff" rx="14"/>

  <!-- ── RELATIONSHIP LINES (rendered first, behind boxes) ── -->

  <!-- from Enterprise bottom-left (370,140) → Sales User top-center (170,210) -->
